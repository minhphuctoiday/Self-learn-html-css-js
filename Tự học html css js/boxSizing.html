<!DOCTYPE html>
<html>
    <head>
        <title>Phúc - hoho</title>
        <meta charset = "utf - 8">
        <style>
            .box{
                color: #ffff;
                background-color: purple;
                width: 100px;
                height: 100px;
                padding: 16px;
                /*cơ chế box-sizing: border-box là cho width bằng border + padding + content
                chế độ mặc định box-sizing: content-box là cho width bằng content*/
                box-sizing: border-box;
            }
        </style>
    </head>
    <body>
        <div class = "box">
            Đây là content
        </div>
    </body>
</html>
