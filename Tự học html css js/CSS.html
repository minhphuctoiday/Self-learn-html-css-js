<!DOCTYPE html>
<html>
    <head>
        <title>Phúc - 2005</title>
        <meta charset ="utf-8">
        <link rel="stylesheet" href = "cssExternal[BaiCSS].css">
        <style> /* Cách 1: đoạn để viết CSS chèn vào trong với hình thưc internal */
            /* h1 là vị trí của tag áp dụng attribute; color,... là attribute*/
            h1 {
                color: red;
                font-size: 40px;
            } 
        </style>
    </head>

    <body>
        <div>
            <h1 style ="color:aqua; font-size:30px;">CSS in HTML?</h1>
            <ol> <!--ordered list-->
                <li>Internal</li> <!--Sửa, chèn font trực tiếp trong file với tag: style-->
                <li>External</li> <!---->
                <li>Inline</li> <!---->
            </ol>
        </div>
    </body>
</html>
